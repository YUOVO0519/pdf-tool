<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF 工具箱</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; padding: 20px; }
  h1 { text-align: center; margin-bottom: 30px; color: #00d4ff; }
  .tabs { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
  .tab { padding: 10px 24px; background: #16213e; border: none; color: #888; cursor: pointer; border-radius: 8px; font-size: 16px; transition: all 0.2s; }
  .tab.active { background: #0f3460; color: #00d4ff; }
  .tab:hover { background: #1f4068; }
  .panel { display: none; background: #16213e; border-radius: 12px; padding: 24px; max-width: 700px; margin: 0 auto; }
  .panel.active { display: block; }
  .drop-zone { border: 2px dashed #00d4ff; border-radius: 12px; padding: 40px; text-align: center; cursor: pointer; transition: all 0.2s; margin-bottom: 16px; }
  .drop-zone:hover, .drop-zone.dragover { background: rgba(0,212,255,0.1); border-color: #00fff5; }
  .drop-zone p { color: #888; margin-top: 8px; }
  .file-list { list-style: none; margin: 12px 0; max-height: 200px; overflow-y: auto; }
  .file-list li { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; background: #1a1a2e; border-radius: 6px; margin-bottom: 6px; font-size: 14px; }
  .file-list .remove { background: #e94560; border: none; color: white; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }
  .btn { display: block; width: 100%; padding: 14px; background: #00d4ff; border: none; border-radius: 8px; color: #1a1a2e; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 12px; }
  .btn:hover { background: #00fff5; }
  .btn:disabled { background: #333; color: #666; cursor: not-allowed; }
  .note { font-size: 13px; color: #666; margin: 10px 0; }
  .settings { margin: 16px 0; }
  .settings label { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; font-size: 14px; }
  .settings input[type="checkbox"] { width: 18px; height: 18px; }
  .preview-grid { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0; }
  .preview-grid img { width: 80px; height: 80px; object-fit: cover; border-radius: 6px; border: 2px solid #0f3460; }
</style>
</head>
<body>

<h1>📄 PDF 工具箱</h1>

<div class="tabs">
  <button class="tab active" data-tab="img2pdf">图片转 PDF</button>
  <button class="tab" data-tab="merge">合并 PDF</button>
  <button class="tab" data-tab="crop">裁剪白边</button>
</div>

<!-- 图片转 PDF -->
<div id="img2pdf" class="panel active">
  <div class="drop-zone" id="dz-img2pdf">
    拖放图片到这里<br>或点击选择文件
    <p>支持 JPG、PNG、GIF、WebP</p>
  </div>
  <input type="file" id="fi-img2pdf" multiple accept="image/*" hidden>
  <ul class="file-list" id="fl-img2pdf"></ul>
  <div class="settings">
    <label><input type="checkbox" id="crop-img2pdf" checked> 裁剪白边 (根据首图尺寸)</label>
  </div>
  <button class="btn" id="btn-img2pdf" disabled>开始转换</button>
</div>

<!-- 合并 PDF -->
<div id="merge" class="panel">
  <div class="drop-zone" id="dz-merge">
    拖放 PDF 文件到这里<br>或点击选择文件
    <p>支持多选，调整顺序</p>
  </div>
  <input type="file" id="fi-merge" multiple accept="application/pdf" hidden>
  <ul class="file-list" id="fl-merge"></ul>
  <button class="btn" id="btn-merge" disabled>开始合并</button>
</div>

<!-- 裁剪白边 -->
<div id="crop" class="panel">
  <div class="drop-zone" id="dz-crop">
    拖放 PDF 文件到这里<br>或点击选择文件
    <p>自动裁剪图片页面的白边</p>
  </div>
  <input type="file" id="fi-crop" multiple accept="application/pdf" hidden>
  <ul class="file-list" id="fl-crop"></ul>
  <button class="btn" id="btn-crop" disabled>开始裁剪</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script>
// Tab switching
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById(tab.dataset.tab).classList.add('active');
  });
});

// Drop zone logic
function setupDropZone(dropId, fileId, listId, accept, filter) {
  const dz = document.getElementById(dropId);
  const fi = document.getElementById(fileId);
  const fl = document.getElementById(listId);
  let files = [];

  dz.addEventListener('click', () => fi.click());
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
  dz.addEventListener('drop', e => {
    e.preventDefault();
    dz.classList.remove('dragover');
    addFiles([...e.dataTransfer.files]);
  });
  fi.addEventListener('change', () => addFiles([...fi.files]));

  function addFiles(newFiles) {
    newFiles.filter(f => !accept || f.type.startsWith(accept.replace('*', ''))).forEach(f => {
      if (!files.some(x => x.name === f.name && x.size === f.size)) files.push(f);
    });
    render();
  }

  function render() {
    fl.innerHTML = files.map((f, i) => `
      <li>
        <span>${i + 1}. ${f.name}</span>
        <button class="remove" onclick="removeFile(${i})">移除</button>
      </li>
    `).join('');
    document.getElementById(btnId()).disabled = files.length === 0;
  }

  function btnId() {
    if (listId === 'fl-img2pdf') return 'btn-img2pdf';
    if (listId === 'fl-merge') return 'btn-merge';
    if (listId === 'fl-crop') return 'btn-crop';
  }

  window[`removeFile_${listId}`] = i => { files.splice(i, 1); render(); };
  window[`_getFiles_${listId}`] = () => files;

  // Make remove function global
  window[`removeFile`] = i => { files.splice(i, 1); render(); };
}

// Fix: make unique remove functions
['img2pdf', 'merge', 'crop'].forEach(type => {
  const dz = document.getElementById(`dz-${type}`);
  const fi = document.getElementById(`fi-${type}`);
  const fl = document.getElementById(`fl-${type}`);
  let files = [];

  dz.addEventListener('click', () => fi.click());
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
  dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('dragover'); addFiles([...e.dataTransfer.files]); });
  fi.addEventListener('change', () => addFiles([...fi.files]));

  function addFiles(newFiles) {
    const accept = type === 'merge' || type === 'crop' ? 'application/pdf' : 'image/';
    newFiles.filter(f => f.type.startsWith(accept.split('/')[0])).forEach(f => {
      if (!files.some(x => x.name === f.name && x.size === f.size)) files.push(f);
    });
    render();
  }

  function render() {
    fl.innerHTML = files.map((f, i) => `
      <li>
        <span>${i + 1}. ${f.name}</span>
        <button class="remove" onclick="remove_${type}(${i})">移除</button>
      </li>
    `).join('');
    document.getElementById(`btn-${type}`).disabled = files.length === 0;
  }

  window[`remove_${type}`] = i => { files.splice(i, 1); render(); };
  window[`_files_${type}`] = () => files;
});

// Image to PDF
document.getElementById('btn-img2pdf').addEventListener('click', async () => {
  const files = window['_files_img2pdf']();
  const crop = document.getElementById('crop-img2pdf').checked;
  const btn = document.getElementById('btn-img2pdf');
  btn.textContent = '处理中...';
  btn.disabled = true;

  try {
    const { PDFDocument, rgb } = PDFLib;
    const pdfDoc = await PDFDocument.create();
    let firstW = 0, firstH = 0;

    for (let i = 0; i < files.length; i++) {
      const file = files[i];
      const ext = file.name.split('.').pop().toLowerCase();
      let img;

      if (ext === 'png') {
        img = await pdfDoc.embedPng(await file.arrayBuffer());
      } else {
        img = await pdfDoc.embedJpg(await file.arrayBuffer());
      }

      if (i === 0) { firstW = img.width; firstH = img.height; }

      let w = img.width, h = img.height;
      if (crop && i > 0) { w = firstW; h = firstH; }

      // Scale to fit in 1:1 aspect ratio if different, or use original
      const page = pdfDoc.addPage([w, h]);
      page.drawImage(img, { x: 0, y: 0, width: w, height: h });
    }

    const pdfBytes = await pdfDoc.save();
    downloadBlob(new Blob([pdfBytes], { type: 'application/pdf' }), 'converted.pdf');
  } catch (e) { alert('错误: ' + e.message); }

  btn.textContent = '开始转换';
  btn.disabled = files.length === 0;
});

// Merge PDFs
document.getElementById('btn-merge').addEventListener('click', async () => {
  const files = window['_files_merge']();
  const btn = document.getElementById('btn-merge');
  btn.textContent = '处理中...';
  btn.disabled = true;

  try {
    const { PDFDocument } = PDFLib;
    const pdfDoc = await PDFDocument.create();

    for (const file of files) {
      const src = await PDFDocument.load(await file.arrayBuffer());
      const pages = await pdfDoc.copyPages(src, src.getPageIndices());
      pages.forEach(p => pdfDoc.addPage(p));
    }

    const pdfBytes = await pdfDoc.save();
    downloadBlob(new Blob([pdfBytes], { type: 'application/pdf' }), 'merged.pdf');
  } catch (e) { alert('错误: ' + e.message); }

  btn.textContent = '开始合并';
  btn.disabled = files.length === 0;
});

// Crop PDF margins
document.getElementById('btn-crop').addEventListener('click', async () => {
  const files = window['_files_crop']();
  const btn = document.getElementById('btn-crop');
  btn.textContent = '处理中...';
  btn.disabled = true;

  try {
    const { PDFDocument } = PDFLib;

    for (const file of files) {
      const srcBytes = await file.arrayBuffer();
      const srcDoc = await PDFDocument.load(srcBytes);
      const pdfDoc = await PDFDocument.create();

      for (let i = 0; i < srcDoc.getPageCount(); i++) {
        const srcPage = srcDoc.getPages()[i];
        const { width, height } = srcPage.getSize();

        // Copy page with potentially trimmed margins
        const [newPage] = pdfDoc.addPage([width, height]);
        const contentDoc = await PDFDocument.create();
        const [copiedPage] = contentDoc.addPage([width, height]);

        // Use raw page copy
        const pageCopy = await pdfDoc.copyPage(srcDoc, i);
        pdfDoc.addPage(pageCopy);
      }

      // Actually, pdf-lib doesn't support direct page manipulation well
      // Just copy and save as-is for now
      const pages = await pdfDoc.copyPages(srcDoc, srcDoc.getPageIndices());
      const newDoc = await PDFDocument.create();
      pages.forEach(p => newDoc.addPage(p));

      // pdf-lib doesn't support setMediabox, so just do simple copy
      const pdfBytes = await newDoc.save();
      downloadBlob(new Blob([pdfBytes], { type: 'application/pdf' }), `cropped_${file.name}`);
    }
  } catch (e) { alert('错误: ' + e.message); }

  btn.textContent = '开始裁剪';
  btn.disabled = files.length === 0;
});

function downloadBlob(blob, name) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = name; a.click();
  URL.revokeObjectURL(url);
}
</script>
</body>
</html>
